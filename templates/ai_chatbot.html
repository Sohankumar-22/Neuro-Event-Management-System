{% extends "layout.html" %}
{% block content %}
<style>
  .chat-page {
    max-width: 900px;
    margin: 0 auto;
    padding: 2rem;
    min-height: 85vh;
    display: flex;
    flex-direction: column;
  }

  .chat-hero {
    text-align: center;
    margin-bottom: 2rem;
  }

  .ai-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: rgba(0, 238, 255, 0.1);
    border: 1px solid rgba(0, 238, 255, 0.3);
    padding: 0.4rem 1.2rem;
    border-radius: 50px;
    font-size: 0.8rem;
    color: var(--primary);
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 1rem;
  }

  .ai-dot {
    width: 8px; height: 8px;
    background: #00ff88;
    border-radius: 50%;
    box-shadow: 0 0 8px #00ff88;
    animation: pulse-dot 2s infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .chat-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: var(--glass);
    border: 1px solid var(--border);
    border-radius: 24px;
    overflow: hidden;
    backdrop-filter: blur(20px);
  }

  .chat-header {
    padding: 1.5rem 2rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 1rem;
    background: rgba(0, 238, 255, 0.03);
  }

  .bot-avatar {
    width: 48px; height: 48px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--primary), #9333ea);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
    box-shadow: 0 0 20px rgba(0, 238, 255, 0.3);
  }

  .bot-info h3 {
    font-size: 1rem;
    font-weight: 700;
    color: white;
    margin-bottom: 0.2rem;
  }

  .bot-info p {
    font-size: 0.75rem;
    color: var(--text-dim);
  }

  .messages-area {
    flex: 1;
    min-height: 400px;
    max-height: 500px;
    overflow-y: auto;
    padding: 2rem;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
    scrollbar-width: thin;
    scrollbar-color: var(--primary) transparent;
  }

  .message {
    display: flex;
    gap: 1rem;
    animation: msg-appear 0.3s ease;
  }

  @keyframes msg-appear {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user {
    flex-direction: row-reverse;
  }

  .msg-avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    flex-shrink: 0;
  }

  .msg-avatar.bot-av {
    background: linear-gradient(135deg, var(--primary), #9333ea);
  }

  .msg-avatar.user-av {
    background: linear-gradient(135deg, #9333ea, #ff4081);
  }

  .msg-bubble {
    max-width: 75%;
    padding: 1rem 1.4rem;
    border-radius: 18px;
    font-size: 0.95rem;
    line-height: 1.7;
  }

  .msg-bubble.bot {
    background: rgba(0, 238, 255, 0.07);
    border: 1px solid rgba(0, 238, 255, 0.15);
    border-top-left-radius: 4px;
    color: white;
  }

  .msg-bubble.user {
    background: linear-gradient(135deg, #9333ea, #7c3aed);
    border-top-right-radius: 4px;
    color: white;
  }

  .msg-bubble strong { font-weight: 700; }
  .msg-bubble table { font-size: 0.85rem; border-collapse: collapse; margin-top: 0.5rem; }
  .msg-bubble th, .msg-bubble td { padding: 0.4rem 0.8rem; border: 1px solid rgba(255,255,255,0.1); }

  .typing-indicator {
    display: flex;
    gap: 0.4rem;
    padding: 1rem 1.4rem;
    background: rgba(0, 238, 255, 0.07);
    border: 1px solid rgba(0, 238, 255, 0.15);
    border-radius: 18px;
    border-top-left-radius: 4px;
    width: fit-content;
  }

  .typing-dot {
    width: 8px; height: 8px;
    background: var(--primary);
    border-radius: 50%;
    animation: typing 1.2s infinite;
  }

  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typing {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-8px); opacity: 1; }
  }

  .quick-replies {
    padding: 1rem 2rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.6rem;
    border-top: 1px solid var(--border);
    background: rgba(0, 0, 0, 0.2);
  }

  .quick-btn {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 0.4rem 1rem;
    border-radius: 50px;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: 'Inter', sans-serif;
  }

  .quick-btn:hover {
    background: rgba(0, 238, 255, 0.1);
    border-color: var(--primary);
    color: var(--primary);
    transform: translateY(-1px);
  }

  .chat-input-area {
    padding: 1.5rem 2rem;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 1rem;
    align-items: center;
  }

  .chat-input {
    flex: 1;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0.9rem 1.4rem;
    color: white;
    font-size: 0.95rem;
    font-family: 'Inter', sans-serif;
    transition: border-color 0.2s;
    outline: none;
  }

  .chat-input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 15px rgba(0, 238, 255, 0.1);
  }

  .send-btn {
    width: 48px; height: 48px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--primary), #9333ea);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    transition: all 0.2s ease;
    flex-shrink: 0;
  }

  .send-btn:hover {
    transform: scale(1.1);
    box-shadow: 0 5px 20px rgba(0, 238, 255, 0.4);
  }

  .timestamp {
    font-size: 0.7rem;
    color: rgba(255,255,255,0.3);
    margin-top: 0.3rem;
    text-align: right;
  }
  .message.user .timestamp { text-align: right; }
  .message:not(.user) .timestamp { text-align: left; }
</style>

<div class="chat-page">
  <div class="chat-hero animate-fade-in">
    <div class="ai-badge">
      <div class="ai-dot"></div>
      AI Assistant — Online
    </div>
    <h1 class="gradient-text" style="font-size: 2.8rem; margin-bottom: 0.5rem;">Eventer AI</h1>
    <p style="color: var(--text-dim);">Your intelligent event planning concierge, available 24/7</p>
  </div>

  <div class="chat-container animate-fade-in" style="animation-delay: 0.15s;">
    <div class="chat-header">
      <div class="bot-avatar">🤖</div>
      <div class="bot-info">
        <h3>Eventer AI Assistant</h3>
        <p>🟢 Online · Powered by Neuro Eventer Intelligence</p>
      </div>
    </div>

    <div class="messages-area" id="messagesArea">
      <!-- Welcome message -->
      <div class="message">
        <div class="msg-avatar bot-av">🤖</div>
        <div>
          <div class="msg-bubble bot" id="welcomeMsg"></div>
          <div class="timestamp">Just now</div>
        </div>
      </div>
    </div>

    <div class="quick-replies" id="quickReplies">
      <button class="quick-btn" onclick="sendQuick('How do I book an event?')">📅 How to book?</button>
      <button class="quick-btn" onclick="sendQuick('What are the pricing packages?')">💰 Pricing</button>
      <button class="quick-btn" onclick="sendQuick('Tell me about your wedding services')">💍 Weddings</button>
      <button class="quick-btn" onclick="sendQuick('Tell me about corporate events')">🤝 Corporate</button>
      <button class="quick-btn" onclick="sendQuick('How does the AI price predictor work?')">🤖 AI Predictor</button>
      <button class="quick-btn" onclick="sendQuick('What payment methods do you accept?')">💳 Payments</button>
      <button class="quick-btn" onclick="sendQuick('What is your cancellation policy?')">❌ Cancellations</button>
    </div>

    <div class="chat-input-area">
      <input
        type="text"
        class="chat-input"
        id="chatInput"
        placeholder="Ask me anything about events, booking, pricing..."
        autocomplete="off"
      />
      <button class="send-btn" onclick="sendMessage()" id="sendBtn">
        ➤
      </button>
    </div>
  </div>
</div>

<script>
  const WELCOME = "👋 Welcome to **Eventer AI**! I'm your personal event planning assistant.\n\nI can help you with:\n- 📅 **Booking** an event\n- 💰 **Pricing** & packages\n- 📍 **Venues** across India\n- 💍 **Wedding**, 🎂 Birthday, 🤝 Corporate & 🎤 Meetup events\n- 🤖 **AI Budget Predictor**\n- 📞 **Support** & contact\n\nWhat would you like to know?";

  function parseMarkdown(text) {
    return text
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.*?)\*/g, '<em>$1</em>')
      .replace(/\n\n/g, '<br><br>')
      .replace(/\n/g, '<br>')
      .replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2" style="color:var(--primary);font-weight:600;">$1</a>');
  }

  function formatTime() {
    const now = new Date();
    return now.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
  }

  function addMessage(text, isUser = false) {
    const area = document.getElementById('messagesArea');
    const div = document.createElement('div');
    div.className = `message ${isUser ? 'user' : ''}`;

    const avatar = `<div class="msg-avatar ${isUser ? 'user-av' : 'bot-av'}">${isUser ? '👤' : '🤖'}</div>`;
    const bubble = `<div class="msg-bubble ${isUser ? 'user' : 'bot'}">${parseMarkdown(text)}</div>`;
    const time = `<div class="timestamp">${formatTime()}</div>`;

    if (isUser) {
      div.innerHTML = `${avatar}<div>${bubble}${time}</div>`;
    } else {
      div.innerHTML = `${avatar}<div>${bubble}${time}</div>`;
    }

    area.appendChild(div);
    area.scrollTop = area.scrollHeight;
    return div;
  }

  function showTyping() {
    const area = document.getElementById('messagesArea');
    const div = document.createElement('div');
    div.className = 'message';
    div.id = 'typingIndicator';
    div.innerHTML = `
      <div class="msg-avatar bot-av">🤖</div>
      <div class="typing-indicator">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>`;
    area.appendChild(div);
    area.scrollTop = area.scrollHeight;
  }

  function hideTyping() {
    const el = document.getElementById('typingIndicator');
    if (el) el.remove();
  }

  async function sendMessage() {
    const input = document.getElementById('chatInput');
    const message = input.value.trim();
    if (!message) return;

    input.value = '';
    addMessage(message, true);

    // Hide quick replies after first message
    document.getElementById('quickReplies').style.display = 'none';

    showTyping();

    try {
      const resp = await fetch('/api/ai/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message })
      });
      const data = await resp.json();
      hideTyping();
      addMessage(data.response);
    } catch (e) {
      hideTyping();
      addMessage('⚠️ Sorry, I encountered an error. Please try again!');
    }
  }

  function sendQuick(msg) {
    document.getElementById('chatInput').value = msg;
    sendMessage();
  }

  document.getElementById('chatInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') sendMessage();
  });

  // Show welcome message with typing effect
  window.addEventListener('DOMContentLoaded', () => {
    const el = document.getElementById('welcomeMsg');
    el.innerHTML = parseMarkdown(WELCOME);
  });
</script>
{% endblock %}
