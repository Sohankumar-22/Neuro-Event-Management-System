{% extends "layout.html" %}
{% block content %}
<style>
    .auth-wrapper { display: flex; align-items: center; justify-content: center; min-height: 70vh; padding: 2rem; }
    .auth-card { width: 100%; max-width: 450px; padding: 3rem; }
    .auth-header { text-align: center; margin-bottom: 2.5rem; }
</style>

<div class="auth-wrapper">
    <div class="glass-card auth-card animate-fade-in">
        <div class="auth-header">
            <h2 class="gradient-text">Recover Access</h2>
            <p style="color: var(--text-dim);">Enter your registered email to receive a secure link</p>
        </div>

        <form action="" method="POST">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="email@example.com" required style="width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border); color: white; padding: 0.8rem; border-radius: 4px;">
            </div>

            <div style="margin-top: 2rem;">
                <button type="submit" class="btn-premium btn-primary" style="width: 100%;">SEND RECOVERY LINK</button>
            </div>

            <div style="text-align: center; margin-top: 2rem;">
                <a href="{{ url_for('login') }}" style="color: var(--text-dim); text-decoration: none; font-size: 0.9rem;">Back to Login</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
