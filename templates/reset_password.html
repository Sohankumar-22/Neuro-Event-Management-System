{% extends "layout.html" %}
{% block content %}
<style>
    .auth-wrapper { display: flex; align-items: center; justify-content: center; min-height: 70vh; padding: 2rem; }
    .auth-card { width: 100%; max-width: 450px; padding: 3rem; }
    .auth-header { text-align: center; margin-bottom: 2.5rem; }
</style>

<div class="auth-wrapper">
    <div class="glass-card auth-card animate-fade-in">
        <div class="auth-header">
            <h2 class="gradient-text">Reset Password</h2>
            <p style="color: var(--text-dim);">Finalize your security credentials</p>
        </div>

        <form action="" method="POST">
            <div class="input-group">
                <label>New Elite Password</label>
                <input type="password" name="password" placeholder="••••••••" required style="width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border); color: white; padding: 0.8rem; border-radius: 4px;">
            </div>

            <div style="margin-top: 2rem;">
                <button type="submit" class="btn-premium btn-primary" style="width: 100%;">VALIDATE & LOGIN</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
