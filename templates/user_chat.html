{% extends "layout.html" %}

{% block content %}
<script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
<style>
  .chat-wrapper {
    max-width: 1000px;
    margin: 0 auto;
    padding: 2rem;
  }

  #chat-container {
    height: 750px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg-card);
    border: 1px solid var(--border);
  }

  .chat-header {
    background: linear-gradient(135deg, var(--secondary) 0%, var(--primary) 100%);
    padding: 2rem;
    text-align: center;
    color: white;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
  }

  .chat-header h2 {
    font-family: 'Outfit', sans-serif;
    margin-bottom: 0.5rem;
  }

  #connection-status {
    display: inline-block;
    padding: 4px 12px;
    background: rgba(0, 0, 0, 0.3);
    border-radius: 50px;
    font-size: 0.75rem;
    margin-top: 1rem;
    border: 1px solid rgba(255, 255, 255, 0.1);
  }

  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 2rem;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
    background: rgba(0, 0, 0, 0.2);
  }

  /* Custom Scrollbar */
  #chat::-webkit-scrollbar {
    width: 6px;
  }

  #chat::-webkit-scrollbar-track {
    background: transparent;
  }

  #chat::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 10px;
  }

  .msg {
    max-width: 80%;
    padding: 1.2rem;
    border-radius: 20px;
    position: relative;
    animation: slideIn 0.3s ease-out;
    line-height: 1.5;
  }

  .msg.user {
    align-self: flex-end;
    background: var(--secondary);
    color: white;
    border-bottom-right-radius: 4px;
    box-shadow: 0 5px 15px rgba(147, 51, 234, 0.2);
  }

  .msg.admin {
    align-self: flex-start;
    background: rgba(255, 255, 255, 0.05);
    color: white;
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }

  .msg-sender {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 0.5rem;
    opacity: 0.8;
  }

  .msg-time {
    font-size: 0.65rem;
    margin-top: 0.5rem;
    opacity: 0.6;
    text-align: right;
  }

  #message-form {
    padding: 1.5rem 2rem;
    background: rgba(0, 0, 0, 0.4);
    border-top: 1px solid var(--border);
    display: flex;
    gap: 1rem;
    align-items: center;
  }

  #msg {
    flex: 1;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 1rem 1.5rem;
    color: white;
    outline: none;
    transition: var(--transition);
  }

  #msg:focus {
    border-color: var(--primary);
    background: rgba(255, 255, 255, 0.08);
  }

  @keyframes slideIn {
    from {
      opacity: 0;
      transform: translateY(10px);
    }

    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
</style>

<div class="chat-wrapper">
  <div id="chat-container" class="glass-card" data-conversation-id="{{ conversation_id }}">
    <div class="chat-header">
      <h2 class="animate-fade-in">Experience Support</h2>
      <p class="animate-fade-in" style="font-size: 0.9rem; opacity: 0.9;">Direct line to our premium event specialists
      </p>
      <div id="connection-status" class="animate-fade-in">Establishing secure connection...</div>
    </div>

    <div id="chat"></div>

    <form id="message-form" class="animate-fade-in">
      <input id="msg" autocomplete="off" placeholder="Inquire about your event..." maxlength="1000">
      <button type="submit" id="send-btn" class="btn-premium btn-primary" style="padding: 0.8rem 2rem;">
        Send
      </button>
    </form>
  </div>
</div>

<script>
  const socket = io();
  const conversationId = Number(document.getElementById('chat-container').dataset.conversationId);
  const sender = "user";

  socket.on('connect', () => {
    updateConnectionStatus('● Securely Connected', true);
    socket.emit('join', { conversation_id: conversationId });
    socket.emit('get_messages', { conversation_id: conversationId });
  });

  socket.on('disconnect', () => updateConnectionStatus('○ Disconnected', false));
  socket.on('connect_error', () => updateConnectionStatus('! Connection Error', false));

  function updateConnectionStatus(status, isConnected) {
    const statusEl = document.getElementById('connection-status');
    if (statusEl) {
      statusEl.textContent = status;
      statusEl.style.color = isConnected ? '#00eeff' : '#ff4081';
    }
  }

  socket.on('message_history', (data) => {
    if (data.conversation_id == conversationId) {
      const chatDiv = document.getElementById('chat');
      chatDiv.innerHTML = '';
      if (data.messages) data.messages.forEach(displayMessage);
      scrollToBottom();
    }
  });

  socket.on('new_message', msg => {
    if (msg.conversation_id == conversationId) {
      displayMessage(msg);
      scrollToBottom();
    }
  });

  function displayMessage(msg) {
    const chatDiv = document.getElementById('chat');
    const messageDiv = document.createElement('div');
    messageDiv.className = 'msg ' + msg.sender;

    const senderDiv = document.createElement('div');
    senderDiv.className = 'msg-sender';
    senderDiv.textContent = msg.sender === 'user' ? 'You' : 'Concierge';

    const contentDiv = document.createElement('div');
    contentDiv.className = 'msg-content';
    contentDiv.textContent = msg.content;

    const timeDiv = document.createElement('div');
    timeDiv.className = 'msg-time';
    timeDiv.textContent = formatTime(msg.timestamp || msg.created_at || new Date());

    messageDiv.appendChild(senderDiv);
    messageDiv.appendChild(contentDiv);
    messageDiv.appendChild(timeDiv);

    chatDiv.appendChild(messageDiv);
  }

  function scrollToBottom() {
    const chatDiv = document.getElementById('chat');
    chatDiv.scrollTop = chatDiv.scrollHeight;
  }

  function formatTime(timestamp) {
    const date = new Date(timestamp);
    return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  document.getElementById('message-form').onsubmit = e => {
    e.preventDefault();
    const msgInput = document.getElementById('msg');
    const message = msgInput.value.trim();
    if (!message) return;

    socket.emit('send_message', {
      conversation_id: conversationId,
      sender: sender,
      content: message
    });
    msgInput.value = '';
    msgInput.focus();
  };

  window.addEventListener('load', () => document.getElementById('msg').focus());
</script>
{% endblock %}
